<!DOCTYPE html>
<html>
<head>
  <title>Create Icons</title>
</head>
<body>
  <canvas id="canvas192" width="192" height="192"></canvas>
  <canvas id="canvas512" width="512" height="512"></canvas>
  <script>
    function createIcon(canvas, size) {
      const ctx = canvas.getContext('2d');
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#667eea');
      gradient.addColorStop(1, '#764ba2');

      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, size, size);

      ctx.fillStyle = 'white';
      ctx.font = `bold ${size * 0.4}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('周末', size / 2, size * 0.6);

      ctx.strokeStyle = 'white';
      ctx.lineWidth = size / 30;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      const checkSize = size * 0.25;
      const checkX = size * 0.25;
      const checkY = size * 0.75;
      ctx.beginPath();
      ctx.moveTo(checkX, checkY);
      ctx.lineTo(checkX + checkSize * 0.4, checkY + checkSize * 0.4);
      ctx.lineTo(checkX + checkSize, checkY - checkSize * 0.2);
      ctx.stroke();
    }

    createIcon(document.getElementById('canvas192'), 192);
    createIcon(document.getElementById('canvas512'), 512);

    function download(canvas, filename) {
      const link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    download(document.getElementById('canvas192'), 'icon-192x192.png');
    download(document.getElementById('canvas512'), 'icon-512x512.png');
  </script>
</body>
</html>
